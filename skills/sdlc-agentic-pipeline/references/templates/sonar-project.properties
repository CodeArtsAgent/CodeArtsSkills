sonar.projectKey=<GITHUB_OWNER>_<GITHUB_REPO>
sonar.organization=<SONAR_ORGANIZATION>
sonar.sources=backend/app,frontend/src
sonar.python.version=3.11
sonar.sourceEncoding=UTF-8
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/migrations/**
# Coverage reporting (adjust path for your test runner's output)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
# Exclude data files from duplication check (prevents false positives)
sonar.cpd.exclusions=frontend/src/data/**